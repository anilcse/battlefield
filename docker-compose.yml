services:
  db:
    image: postgres:16
    container_name: nof1-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nof1
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nof1-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
      POLYMARKET_BASE_URL: ${POLYMARKET_BASE_URL}
      POLYMARKET_API_KEY: ${POLYMARKET_API_KEY}
      POLYMARKET_SECRET: ${POLYMARKET_SECRET}
      POLYMARKET_PASSPHRASE: ${POLYMARKET_PASSPHRASE}
      POLYMARKET_CHAIN_ID: ${POLYMARKET_CHAIN_ID}
      ENABLE_LIVE_TRADING: ${ENABLE_LIVE_TRADING}
      DEFAULT_MODEL_MONTHLY_BUDGET_USD: ${DEFAULT_MODEL_MONTHLY_BUDGET_USD}
      MODEL_NAMES: ${MODEL_NAMES}
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
